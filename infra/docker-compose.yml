version: '3.8'

services:
  # Persistence
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: vitallens
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vitallens_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Messaging
  kafka:
    image: bitnamilegacy/kafka:3.6
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    ports:
      - "9092:9092"

  # Core Services (Mocked for compose)
  recovery-service:
    build:
      context: ../services/recovery-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vitallens_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  ai-coach-service:
    build:
      context: ../services/ai-coach-service
    environment:
      DATABASE_URL: postgresql://vitallens:password@postgres:5432/vitallens_db
      GROQ_API_KEY: ${GROQ_API_KEY}
    env_file:
      - .env
    depends_on:
      - postgres

  api-gateway:
    build:
      context: ../services/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - recovery-service
      - ai-coach-service

  dashboard-service:
    build:
      context: ../services/dashboard-service
    ports:
      - "5173:5173"
    environment:
      - VITE_GATEWAY_URL=http://localhost:8080
    depends_on:
      - api-gateway

volumes:
  postgres_data:
